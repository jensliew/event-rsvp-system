name: Deploy Frontend to S3 & CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'app.js'
      - 'events.js'
      - 'utils.js'
      - 'index.html'
      - 'style.css'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload frontend files to S3
        run: |
          aws s3 cp index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html
          aws s3 cp app.js s3://${{ secrets.S3_BUCKET_NAME }}/app.js
          aws s3 cp events.js s3://${{ secrets.S3_BUCKET_NAME }}/events.js
          aws s3 cp utils.js s3://${{ secrets.S3_BUCKET_NAME }}/utils.js
          aws s3 cp style.css s3://${{ secrets.S3_BUCKET_NAME }}/style.css

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment complete
        run: echo "Frontend deployed successfully!"
